<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logowanie - Blog</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body class="bg-gray-50 min-h-screen flex flex-col">

    <header class="bg-white shadow-sm">
      <div class="max-w-5xl mx-auto px-4 py-3">
        <a href="/" class="text-xl font-bold text-indigo-600 hover:text-indigo-800 transition-colors">Blog</a>
      </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
      <section class="bg-white w-full max-w-sm rounded-2xl shadow-md border border-gray-100 p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Zaloguj się</h1>

        <form id="loginForm" class="flex flex-col gap-4" novalidate>
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-gray-700">E-mail</span>
            <input
              type="email"
              name="email"
              required
              autocomplete="email"
              class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
              placeholder="adres@email.pl"
            />
          </label>

          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-gray-700">Hasło</span>
            <input
              type="password"
              name="password"
              required
              autocomplete="current-password"
              class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
              placeholder="hasło"
            />
          </label>

          <p id="loginError" class="text-red-600 text-sm hidden" role="alert"></p>

          <button
            type="submit"
            class="mt-2 bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-700 active:scale-95 transition-all duration-150"
          >
            Zaloguj się
          </button>
        </form>
      </section>
    </main>

    <script type="module" src="/login/main.js"></script>
  </body>
</html>
