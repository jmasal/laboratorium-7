<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog – Laboratorium 7</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body class="bg-gray-50 min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-40">
      <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between gap-2 flex-wrap">
        <a href="/" class="text-xl font-bold text-indigo-600 hover:text-indigo-800 transition-colors">Blog</a>
        <nav class="flex gap-2 items-center flex-wrap">
          <button
            id="btnAddArticle"
            class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-700 active:scale-95 transition-all duration-150"
          >
            + Dodaj artykuł
          </button>
          <button
            id="btnLogout"
            class="hidden bg-red-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-red-600 active:scale-95 transition-all duration-150"
          >
            Wyloguj
          </button>
          <a
            id="btnLogin"
            href="/laboratorium-7/login/"
            class="hidden border border-indigo-600 text-indigo-600 px-4 py-2 rounded-lg font-medium hover:bg-indigo-50 active:scale-95 transition-all duration-150"
          >
            Zaloguj się
          </a>
        </nav>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
      <section aria-label="Lista artykułów">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Najnowsze artykuły</h1>
        <div id="articles" class="flex flex-col gap-6">
          <p class="text-gray-400 text-center py-12">Wczytuję artykuły…</p>
        </div>
      </section>
    </main>

    <dialog
      id="modalAdd"
      class="w-full max-w-lg rounded-2xl shadow-2xl p-0 backdrop:bg-black/50"
    >
      <div class="p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-4">Dodaj artykuł</h2>
        <form id="formAdd" class="flex flex-col gap-4" novalidate>
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-gray-700">Tytuł</span>
            <input
              name="title"
              type="text"
              required
              class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
              placeholder="Tytuł artykułu"
            />
          </label>
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-gray-700">Podtytuł</span>
            <input
              name="subtitle"
              type="text"
              class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
              placeholder="Podtytuł (opcjonalnie)"
            />
          </label>
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-gray-700">Autor</span>
            <input
              name="author"
              type="text"
              required
              class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
              placeholder="Imię i nazwisko autora"
            />
          </label>
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-gray-700">Treść</span>
            <textarea
              name="content"
              rows="5"
              required
              class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition resize-none"
              placeholder="Treść artykułu…"
            ></textarea>
          </label>
          <p id="addError" class="text-red-600 text-sm hidden"></p>
          <div class="flex justify-end gap-2 mt-2">
            <button
              type="button"
              id="btnAddCancel"
              class="px-4 py-2 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-100 active:scale-95 transition-all duration-150"
            >
              Anuluj
            </button>
            <button
              type="submit"
              class="px-4 py-2 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700 active:scale-95 transition-all duration-150"
            >
              Dodaj
            </button>
          </div>
        </form>
      </div>
    </dialog>

    <dialog
      id="modalEdit"
      class="w-full max-w-lg rounded-2xl shadow-2xl p-0 backdrop:bg-black/50"
    >
      <div class="p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-4">Edytuj artykuł</h2>
        <form id="formEdit" class="flex flex-col gap-4" novalidate>
          <input type="hidden" name="id" />
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-gray-700">Tytuł</span>
            <input
              name="title"
              type="text"
              required
              class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
            />
          </label>
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-gray-700">Podtytuł</span>
            <input
              name="subtitle"
              type="text"
              class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
            />
          </label>
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-gray-700">Autor</span>
            <input
              name="author"
              type="text"
              required
              class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
            />
          </label>
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-gray-700">Treść</span>
            <textarea
              name="content"
              rows="5"
              required
              class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition resize-none"
            ></textarea>
          </label>
          <p id="editError" class="text-red-600 text-sm hidden"></p>
          <div class="flex justify-end gap-2 mt-2">
            <button
              type="button"
              id="btnEditCancel"
              class="px-4 py-2 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-100 active:scale-95 transition-all duration-150"
            >
              Anuluj
            </button>
            <button
              type="submit"
              class="px-4 py-2 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700 active:scale-95 transition-all duration-150"
            >
              Zapisz
            </button>
          </div>
        </form>
      </div>
    </dialog>

    <script type="module" src="/main.js"></script>
  </body>
</html>
